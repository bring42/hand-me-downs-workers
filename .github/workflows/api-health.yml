name: API Health

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  API_BASE: https://hand-me-downs-api.tubas-housing-1c.workers.dev

jobs:
  met:
    name: MET API
    runs-on: ubuntu-latest
    steps:
      - name: Check MET departments
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/api/met/departments")
          echo "HTTP $status"
          [ "$status" = "200" ]

  aic:
    name: AIC API
    runs-on: ubuntu-latest
    steps:
      - name: Check AIC departments
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/api/aic/departments")
          echo "HTTP $status"
          [ "$status" = "200" ]

  rijks:
    name: Rijks API
    runs-on: ubuntu-latest
    steps:
      - name: Check Rijks departments
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/api/rijks/departments")
          echo "HTTP $status"
          [ "$status" = "200" ]

  cma:
    name: CMA API
    runs-on: ubuntu-latest
    steps:
      - name: Check CMA departments
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/api/cma/departments")
          echo "HTTP $status"
          [ "$status" = "200" ]

  mia:
    name: MIA API
    runs-on: ubuntu-latest
    steps:
      - name: Check MIA departments
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/api/mia/departments")
          echo "HTTP $status"
          [ "$status" = "200" ]
