name: MET
on:
  schedule: [{ cron: "0 */6 * * *" }]
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "https://hand-me-downs-api.tubas-housing-1c.workers.dev/api/met/departments")
          echo "HTTP $status" && [ "$status" = "200" ]
